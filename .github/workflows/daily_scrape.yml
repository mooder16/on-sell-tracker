name: Daily UNIQLO Scraper

on:
  schedule:
    # 每4小時執行一次（UTC 0,4,8,12,16,20 點）
    # 台灣時間：08:00, 12:00, 16:00, 20:00, 00:00, 04:00
    - cron: "0 */4 * * *"
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write  # 允許 workflow 寫入（git push）

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install playwright requests

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run UNIQLO Taiwan scraper (API-based)
        run: python scraper.py
        continue-on-error: true

      - name: Run UNIQLO Japan scraper (Playwright)
        run: python scraper_uniqlo_jp.py
        continue-on-error: true

      - name: Run momo MUJI scraper (Playwright)
        run: python scraper_momo_muji.py
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add daily_deals.csv daily_deals.json momo_muji_deals.json uniqlo_jp_deals.json uniqlo_jp_limited.json
          git diff --staged --quiet || git commit -m "chore: update daily deals data [$(date +'%Y-%m-%d')]"
          git push
